<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>random number </title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
width:90%;
max-width:400px;
padding:40px 20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
font-size:28px;
margin-bottom:20px;
letter-spacing:1px;
}

#result{
font-size:60px;
font-weight:bold;
margin:30px 0;
color:#ff3b3b;
text-shadow:0 0 20px rgba(255,0,0,0.8);
transition:0.3s;
}

button{
width:100%;
padding:15px;
font-size:20px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

button:active{
transform:scale(0.97);
}

/* image style */

.image-box{
margin-top:25px;
}

.image-box img{
width:100%;
max-width:200px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

/* credit text */

.credit{
margin-top:15px;
font-size:14px;
opacity:0.8;
letter-spacing:1px;
}

/* Mobile responsive */

@media(max-width:480px){

h1{
font-size:22px;
}

#result{
font-size:45px;
}

button{
font-size:18px;
padding:13px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Aviator Style Crash</h1>

<div id="result">1.02x</div>

<button onclick="generate()">Generate</button>

<div class="image-box">
<img src="img.jpeg" alt="Aviator Image">
</div>

<div class="credit">
Created by Abdullah
</div>

</div>

<script>

function generate(){

let chance = Math.random();

if(chance < 0.1){
document.getElementById("result").innerText = "0x CRASH";
return;
}

let min = 1.02;
let max = 20;

let random = Math.pow(Math.random(),2) * (max-min) + min;

let result = random.toFixed(2);

document.getElementById("result").innerText = result + "x";

}

</script>

</body>
</html>
